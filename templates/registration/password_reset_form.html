{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    Password Reset
{% endblock %}

{% block content %}
    <h1>Password Reset</h1>
    <p>Forgotton your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
    <form method="Post">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit" value="Reset my password" class="btn btn-primary">
            
        
    </form>
{% endblock %}
